name: Publish self-contained Windows build

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish (win-x64 self-contained single file)
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:EnableCompressionInSingleFile=true -o ./artifacts/win-x64

      - name: Package artifact as zip
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $outDir = "./artifacts/win-x64"
          $zip = "./artifacts/BrowseSafe-$tag-win-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          Compress-Archive -Path "$outDir/*" -DestinationPath $zip -Force

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/BrowseSafe-${{ github.ref_name }}-win-x64.zip
          asset_name: BrowseSafe-${{ github.ref_name }}-win-x64.zip
          asset_content_type: application/zip
